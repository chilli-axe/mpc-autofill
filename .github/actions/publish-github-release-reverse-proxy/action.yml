name: Publish GitHub release reverse proxy
description: Publish GitHub release reverse proxy Cloudflare Worker
inputs:
  cloudflare-api-token:
    description: Cloudflare API token
    required: true
  cloudflare-account-id:
    description: Cloudflare account ID
    required: true
runs:
  using: composite
  steps:
    - name: Deploy GitHub release reverse proxy Worker
      uses: cloudflare/wrangler-action@v3
      with:
        wranglerVersion: "4.80.0"
        apiToken: ${{ inputs.cloudflare-api-token }}
        accountId: ${{ inputs.cloudflare-account-id }}
        workingDirectory: github-release-reverse-proxy
