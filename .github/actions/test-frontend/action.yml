name: Frontend tests
description: Test the MPC Autofill static frontend
inputs:
  shard_index:
    description: Shard index (1-based)
    required: false
    default: "1"
  shard_total:
    description: Total number of shards
    required: false
    default: "1"
runs:
  using: composite
  steps:
    - name: Install npm
      uses: actions/setup-node@v4
      with:
        node-version: 22.15
    - name: Compile frontend
      working-directory: frontend
      run: |
        npm ci
        npm run build
      shell: bash
    - name: Install Playwright Browsers
      run: |
        npm install
        npx playwright install --with-deps
      working-directory: frontend
      shell: bash
    - name: Run Jest tests
      if: ${{ inputs.shard_index == '1' }}
      working-directory: frontend
      run: |
        npm run test
      shell: bash
    - name: Run Playwright tests
      run: |
        npx playwright test --shard=${{ inputs.shard_index }}/${{ inputs.shard_total }}
      working-directory: frontend
      shell: bash
    - name: Upload blob report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: blob-report-${{ inputs.shard_index }}
        path: frontend/blob-report/
        retention-days: 1
