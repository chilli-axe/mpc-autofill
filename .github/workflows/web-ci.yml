name: Web CI
on:
  push:
    branches: ["master"]
    paths:
      - "frontend/**"
      - "MPCAutofill/**"
  workflow_dispatch:
jobs:
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: mpcautofill
          POSTGRES_PASSWORD: mpcautofill
          POSTGRES_DB: mpcautofill
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-backend
        with:
          google-drive-api-key: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
          moxfield-secret: ${{ secrets.MOXFIELD_SECRET }}
  test-frontend:
    name: Frontend tests (${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-frontend
        with:
          shard_index: ${{ matrix.shardIndex }}
          shard_total: ${{ matrix.shardTotal }}
  merge-frontend-test-reports:
    name: Merge Playwright reports
    if: ${{ !cancelled() }}
    needs: [test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.15
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: frontend/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge reports
        working-directory: frontend
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
  test-pre-commit:
    name: Formatting and static type checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-pre-commit
  build-frontend:
    name: Build frontend
    needs: [test-backend, test-frontend, test-pre-commit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-frontend
        with:
          ga-measurement-id: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          image-bucket-url: ${{ secrets.IMAGE_CDN_BUCKET_DOMAIN }}
          image-worker-url: ${{ secrets.IMAGE_CDN_WORKER_DOMAIN }}
          google-drive-client-id: ${{ secrets.NEXT_PUBLIC_GOOGLE_DRIVE_CLIENT_ID }}
          google-drive-app-id: ${{ secrets.NEXT_PUBLIC_GOOGLE_DRIVE_APP_ID }}
  publish-frontend-to-github:
    name: Publish frontend to GitHub
    needs: [build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-frontend-to-github
        with:
          github-api-token: ${{ secrets.API_TOKEN_GITHUB }}
  publish-frontend-to-cloudflare:
    name: Publish frontend to Cloudflare
    needs: [build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-frontend-to-cloudflare
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
