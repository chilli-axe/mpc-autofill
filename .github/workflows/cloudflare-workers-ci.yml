name: Cloudflare Workers CI
on:
  push:
    branches: ["master"]
    paths:
      - "image-cdn/**"
      - "github-release-reverse-proxy/**"
  workflow_dispatch:
jobs:
  publish-image-cdn:
    name: Publish image CDN
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-image-cdn
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          worker-domain: ${{ secrets.IMAGE_CDN_WORKER_DOMAIN }}
          google-client-id: ${{ secrets.IMAGE_CDN_GOOGLE_CLIENT_ID }}
          google-client-secret: ${{ secrets.IMAGE_CDN_GOOGLE_CLIENT_SECRET }}
          google-refresh-token: ${{ secrets.IMAGE_CDN_GOOGLE_REFRESH_TOKEN }}
  publish-github-release-reverse-proxy:
    name: Publish GitHub release reverse proxy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-github-release-reverse-proxy
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
