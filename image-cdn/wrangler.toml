name = "image-cdn"
main = "src/index.ts"
compatibility_date = "2026-06-13"
workers_dev = true

[secrets]
required = [ "GOOGLE_CLIENT_ID", "GOOGLE_CLIENT_SECRET", "GOOGLE_REFRESH_TOKEN" ]

[[r2_buckets]]
binding = "thumbnails"
bucket_name = "thumbnails"

[[workflows]]
name = "thumbnail-refresh"
binding = "THUMBNAIL_REFRESH_WORKFLOW"
class_name = "ThumbnailRefreshWorkflow"

[observability]
enabled = true

[[ratelimits]]
name = "GOOGLE_DRIVE_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 12000, period = 10 }
